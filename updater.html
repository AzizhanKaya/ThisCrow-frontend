<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updating ThisCrow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: #ffffff;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            user-select: none;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            background-color: rgba(20, 20, 22, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 128px;
            height: 128px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .status {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #626cfb, #845ef7);
            border-radius: 2px;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px rgba(98, 108, 251, 0.5);
        }

        .percentage {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        #error-message {
            color: #ff5f52;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container" data-tauri-drag-region>
        <img src="crow.png" alt="Logo" class="logo" data-tauri-drag-region>
        <div id="status" class="status">Checking for updates...</div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="percentage" class="percentage">0%</div>
        <div id="error-message">An error occurred, retrying...</div>
    </div>

    <script type="module">
        import { check } from '@tauri-apps/plugin-updater';
        import { relaunch } from '@tauri-apps/plugin-process';

        const statusEl = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const percentageEl = document.getElementById('percentage');
        const errorEl = document.getElementById('error-message');

        async function startUpdate() {
            try {
                const update = await check();
                
                let downloaded = 0;
                let contentLength = 0;

                statusEl.innerText = `Downloading: v${update.version}`;

                await update.downloadAndInstall((event) => {
                    switch (event.event) {
                        case 'Started':
                            contentLength = event.data.contentLength;
                            statusEl.innerText = "Downloading...";
                            break;
                        case 'Progress':
                            downloaded += event.data.chunkLength;
                            if (contentLength) {
                                const percent = Math.round((downloaded / contentLength) * 100);
                                progressBar.style.width = percent + '%';
                                percentageEl.innerText = percent + '%';
                            }
                            break;
                        case 'Finished':
                            statusEl.innerText = "Installing...";
                            progressBar.style.width = '100%';
                            percentageEl.innerText = '100%';
                            break;
                    }
                });

                statusEl.innerText = "Starting...";
                await relaunch();

            } catch (error) {
                console.error("Update error:", error);
                errorEl.style.display = 'block';
                errorEl.innerText = 'Error: ' + error;
                statusEl.innerText = "Update failed.";
            }
        }

        startUpdate();
    </script>
</body>
</html>
